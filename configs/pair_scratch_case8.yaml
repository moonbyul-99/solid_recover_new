# Paired-modality training from scratch (RNA + ATAC peak counts).
# Equivalent to the legacy ``configs/pair_scratch_case8.yaml``.
task: pair_scratch

data:
  train_data_path: "path/to/case_8/train.h5mu"
  test_data_path: "path/to/case_8/test.h5mu"
  key_1: "rna_count"
  key_2: "peak_count"
  batch_size: 512
  to_gpu: false

model:
  feature_num_1: 11817
  feature_num_2: 65401
  hidden_params_1: [1024, 512, 256]
  hidden_params_2: [1024, 512, 256]
  embed_dim: 256
  use_rmsnorm: true
  use_residual: true
  dropout_p: 0.0

training:
  project_dir: "outputs/pair_scratch_case8"
  train_steps: 10000
  eval_points: 80
  save_points: 500
  device: "cuda"

optimizer:
  lr: 1e-3
  warmup_steps: 1000
  steady_1_steps: 1600
  cosine_anneal_steps: 6000
  min_lr: 1e-4

loss:
  vae_beta_1: 1.0
  vae_beta_2: 1.0
  clip_weight: 40.0
  cross_recon_1: 0.8
  cross_recon_2: 0.8
  temperature: 0.07
  # Weighted-CLIP (optional, legacy defaults)
  use_weight: false
  top_k_ratio: 0.1
  bottom_k_ratio: 0.1
  weight_top: 0.1
  weight_bottom: 2.0
